<div class="header-button">
  <app-role-selector></app-role-selector>

  <!-- Botón avatar del usuario -->
  <button mat-button [matMenuTriggerFor]="user" aria-label="perfil" class="header-item">
    <a class="pc-head-link">
      <ng-container *ngIf="currentUser$ | async as u; else defaultAvatar">
        <ng-container *ngIf="hasAvatar(u.avatar); else initialsAvatar">
          <img [src]="getAvatarUrl(u.avatar)" [alt]="u.name" class="user-avatar user-avatar-image"
            (load)="onAvatarLoad()" (error)="onAvatarError(u.avatar)" />
        </ng-container>
        <ng-template #initialsAvatar>
          <div class="user-avatar-initials" [title]="u.name">
            {{ getInitials(u.name) }}
          </div>
        </ng-template>
      </ng-container>
      <ng-template #defaultAvatar>
        <img src="assets/images/user/avatar-2.jpg" alt="user-image" class="user-avatar" />
      </ng-template>
    </a>
  </button>

  <!-- Menú desplegable del usuario -->
  <mat-menu #user="matMenu" xPosition="before" class="dropdown-user-profile">
    <div class="dropdown-header flex align-item-center justify-content-between">
      <h5 class="user-title">Mi Perfil</h5>
    </div>

    <ng-scrollbar style="height: auto; max-height: calc(100vh - 225px)" visibility="hover">
      <div class="dropdown-body">

        <!-- Info del usuario -->
        <ng-container *ngIf="currentUser$ | async as u">
          <div class="flex m-b-5 align-items-center">
            <ng-container *ngIf="hasAvatar(u.avatar); else initialsAvatarLg">
              <img [src]="getAvatarUrl(u.avatar)" [alt]="u.name" class="user-avatar-lg flex-shrink-0"
                (load)="onAvatarLoad()" (error)="onAvatarError(u.avatar)" />
            </ng-container>
            <ng-template #initialsAvatarLg>
              <div class="user-avatar-initials-lg flex-shrink-0">
                {{ getInitials(u.name) }}
              </div>
            </ng-template>
            <div class="topic-description m-l-15">
              <h6 class="user-name m-b-2">{{ u.name }}</h6>
              <p class="mat-body text-muted m-b-0">{{ u.email }}</p>
            </div>
          </div>
        </ng-container>

        <mat-divider class="m-b-15 m-t-15"></mat-divider>

        <!-- Editar Perfil -->
        <a href="javascript:" class="dropdown-item text-muted" (click)="openEditProfile()">
          <svg class="pc-icon m-r-10">
            <use xlink:href="assets/fonts/custom-icon.svg#custom-setting-outline"></use>
          </svg>
          <h6 class="m-b-0">Editar Perfil</h6>
        </a>

        <mat-divider class="m-b-15 m-t-15"></mat-divider>

        <!-- Botón Cerrar Sesión -->
        <div class="grid m-b-10">
          <button mat-flat-button color="warn" class="user-logout" (click)="logout()">
            <div class="flex-inline align-item-center">
              <svg class="pc-icon m-r-10">
                <use xlink:href="assets/fonts/custom-icon.svg#custom-logout-1-outline"></use>
              </svg>
              Cerrar Sesión
            </div>
          </button>
        </div>

      </div>
    </ng-scrollbar>
  </mat-menu>
</div>
