<ng-scrollbar style="height: calc(100vh - 88px)" visibility="hover" orientation="vertical">
  <app-card [showHeader]="false" cardClass="user-card" [padding]="20">
    <ng-container *ngIf="currentUser$ | async as user">
      <div class="flex align-items-center">
        <!-- Avatar con iniciales -->
        <div class="flex-shrink-0 sidebar-avatar">
          {{ getInitials(user.name) }}
        </div>
        <!-- Nombre y rol -->
        <div class="flex-grow-1 user-details">
          <h6 class="user-name-sidebar">{{ user.name }}</h6>
          <div class="user-roles-list">
            <small class="user-role-badge" *ngFor="let label of getDisplayRoles()">{{ label }}</small>
          </div>
        </div>
        <!-- Menú de opciones -->
        <div class="user-setting">
          <a href="javascript:" [matMenuTriggerFor]="menu" class="text-muted">
            <svg class="pc-icon">
              <use xlink:href="assets/fonts/custom-icon.svg#custom-sort-outline"></use>
            </svg>
          </a>
          <mat-menu #menu="matMenu" [overlapTrigger]="false" yPosition="below" xPosition="after">
            <button mat-menu-item (click)="logout()">
              <a href="javascript:" class="text-muted">
                <i class="ti ti-power f-18 m-r-10"></i>
                <span class="mat-body">Cerrar sesión</span>
              </a>
            </button>
          </mat-menu>
        </div>
      </div>
    </ng-container>
  </app-card>
  <div class="navbar-content">
    <ul class="nav coded-inner-navbar" (click)="fireOutClick()" (keydown)="fireOutClick()" tabindex="0">
      @for (item of menus(); track item) {
        @if (item.type === 'group') {
          <app-menu-group-vertical [item]="item" />
        } @else if (item.type === 'item') {
          <app-menu-item [item]="item" />
        } @else if (item.type === 'collapse') {
          <app-menu-collapse [item]="item" />
        }
      }
    </ul>
  </div>
</ng-scrollbar>
