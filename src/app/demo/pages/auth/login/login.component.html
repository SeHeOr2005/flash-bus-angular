<div class="auth-main">
  <div class="auth-wrapper version-1">
    <div class="auth-form">
      <div class="auth-background">
        <div class="yellow-circle"></div>
        <div class="red-circle"></div>
      </div>
      <div class="main-form">
        <app-card [showHeader]="false" class="auth-form-card" [padding]="40">
          <div class="text-center">
            <a href="javascript:">
              <img src="assets/images/flash-bus-logo.png" alt="logo" height="80" />
            </a>
            <div class="login-with">
              @for (list of loginType; track list) {
                <button
                  mat-stroked-button
                  class="m-t-10 text-muted"
                  (click)="onSocialLogin(list.alt)"
                  [disabled]="loading || socialLoading"
                >
                  <div class="flex">
                    <img src="{{ list.image }}" alt="{{ list.alt }}" />
                    <span class="mat-body p-l-10">{{ list.title }}</span>
                  </div>
                </button>
              }
            </div>
          </div>
          <div class="separator">
            <span>O</span>
          </div>
          <h4 class="text-center m-b-25 f-20 f-w-500">Iniciar sesión con tu correo</h4>
          <div class="text-start">
            <label for="name" class="f-w-500">Ingresa tu correo</label>
            <mat-form-field appearance="outline" class="w-100 m-t-5">
              <input matInput [formControl]="email" required placeholder="Correo electrónico" [(ngModel)]="emailValue" />
              @if (email.invalid) {
                <mat-error>{{ getErrorMessage() }}</mat-error>
              }
            </mat-form-field>
            <label for="name" class="f-w-500">Ingresa tu contraseña</label>
            <mat-form-field appearance="outline" class="w-100 m-t-5">
              <input matInput [type]="hide ? 'password' : 'text'" placeholder="Contraseña" [(ngModel)]="password" (keyup.enter)="onLogin()" />
              <button mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Ocultar contraseña'" [attr.aria-pressed]="hide">
                <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
              </button>
            </mat-form-field>
          </div>
          <div class="check-me">
            <mat-checkbox class="float-start" checked color="primary">¿Recuérdame?</mat-checkbox>
            <a class="f-w-400 f-14 text-primary-500 m-b-0" href="javascript:">¿Olvidaste tu contraseña?</a>
          </div>
          @if (errorMessage) {
            <p class="text-danger text-center m-t-10">{{ errorMessage }}</p>
          }
          <div class="grid">
            <button mat-flat-button color="primary" class="b-rad-20 m-t-15" (click)="onLogin()" [disabled]="loading || socialLoading">
              {{ loading ? 'Iniciando sesión...' : 'Iniciar sesión' }}
            </button>
          </div>
          <div class="check-me m-t-20">
            <h6 class="f-w-400 text-muted m-b-0">¿No tienes cuenta?</h6>
            <a [routerLink]="['/auth/register']" class="text-primary-500">Crear cuenta</a>
          </div>
        </app-card>
      </div>
    </div>
  </div>
</div>
