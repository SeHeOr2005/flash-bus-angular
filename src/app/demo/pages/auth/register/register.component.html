<div class="auth-main">
  <div class="auth-wrapper version-1">
    <div class="auth-form">
      <div class="auth-background">
        <div class="yellow-circle"></div>
        <div class="red-circle"></div>
      </div>
      <div class="main-form">
        <app-card [showHeader]="false" class="auth-form-card" [padding]="40">
          <div class="text-center">
            <a href="javascript:">
              <img src="assets/images/flash-bus-logo.png" alt="logo" height="80" />
            </a>
            <div class="login-with">
              @for (list of loginType; track list) {
                <button
                  mat-stroked-button
                  class="m-t-10 text-muted"
                  (click)="onSocialRegister(list.alt)"
                  [disabled]="loading || socialLoading || list.alt === 'github'"
                >
                  <div class="flex">
                    <img src="{{ list.image }}" alt="{{ list.alt }}" />
                    <span class="mat-body p-l-10">{{ list.title }}</span>
                  </div>
                </button>
              }
            </div>
          </div>
          <div class="separator">
            <span>O</span>
          </div>
          <h4 class="text-center m-b-25 f-20 f-w-500">Regístrate con tu correo electrónico</h4>
          <div class="row text-start">
            <div class="col-md-6">
              <label for="name" class="f-w-500">Nombre</label>
              <mat-form-field appearance="outline" class="w-100 m-t-5">
                <input type="text" matInput placeholder="Nombre" [(ngModel)]="firstName" />
              </mat-form-field>
            </div>
            <div class="col-md-6">
              <label for="name" class="f-w-500">Apellido</label>
              <mat-form-field appearance="outline" class="w-100 m-t-5">
                <input type="text" matInput placeholder="Apellido" [(ngModel)]="lastName" />
              </mat-form-field>
            </div>
            <div class="col-12">
              <label for="name" class="f-w-500">Ingresa tu correo electrónico</label>
              <mat-form-field appearance="outline" class="w-100 m-t-5">
                <input matInput [formControl]="email" required placeholder="Correo electrónico" />
                @if (email.invalid) {
                  <mat-error>{{ getErrorMessage() }}</mat-error>
                }
              </mat-form-field>
            </div>
            <div class="col-12">
              <label for="name" class="f-w-500">Ingresa tu contraseña</label>
              <mat-form-field appearance="outline" class="w-100 m-t-5">
                <input matInput [type]="hide ? 'password' : 'text'" placeholder="Contraseña" [(ngModel)]="password" />
                <button mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Ocultar contraseña'" [attr.aria-pressed]="hide">
                  <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
                </button>
              </mat-form-field>
            </div>
            <div class="col-12">
              <label for="name" class="f-w-500">Confirma tu contraseña</label>
              <mat-form-field appearance="outline" class="w-100 m-t-5">
                <input matInput [type]="coHide ? 'password' : 'text'" placeholder="Confirma tu contraseña" [(ngModel)]="confirmPassword" />
                <button
                  mat-icon-button
                  matSuffix
                  (click)="coHide = !coHide"
                  [attr.aria-label]="'Ocultar contraseña'"
                  [attr.aria-pressed]="coHide"
                >
                  <mat-icon>{{ coHide ? 'visibility_off' : 'visibility' }}</mat-icon>
                </button>
              </mat-form-field>
            </div>
          </div>
          <div class="check-me">
            <mat-checkbox class="float-start" checked color="primary">Acepto todos los términos y condiciones</mat-checkbox>
          </div>
          @if (errorMessage) {
            <p class="text-danger text-center m-t-10">{{ errorMessage }}</p>
          }
          <div class="grid">
            <button mat-flat-button color="primary" class="b-rad-20 m-t-15" (click)="onRegister()" [disabled]="loading || socialLoading">
              {{ loading ? 'Registrando...' : 'Registrarse' }}
            </button>
          </div>
          <div class="check-me m-t-15">
            <h6 class="f-w-400 text-muted m-b-0">¿Ya tienes cuenta?</h6>
            <a class="text-primary-500" [routerLink]="['/auth/login']">Inicia sesión</a>
          </div>
        </app-card>
      </div>
    </div>
  </div>
</div>
